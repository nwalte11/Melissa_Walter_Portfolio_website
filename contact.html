<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Melissa Walter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="top-nav">
      <div class="nav-container">
        <div class="nav-brand">Melissa Walter</div>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="resume.html">Resume</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>

    <!-- ===== HEADER ===== -->
    <header class="site-header" id="top">
      <img class="puzzle-strip" src="assets/puzzle-banner.svg" alt="Colorful puzzle piece banner" />
    </header>

    <!-- ===== MAIN ===== -->
    <main>
      <section class="section subpage-section">
        <a class="back-link" href="index.html">&larr; Back to Home</a>
        <h2>Get in Touch</h2>
        <p class="section-hint">Feel free to reach out for collaborations, inquiries, or just to say hello!</p>
        
        <div class="contact-container">
          <div class="contact-form-wrapper">
            <form class="contact-form" id="contactForm">
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required />
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required />
              </div>
              <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
          </div>

          <div class="contact-info">
            <h3>Connect</h3>
            <div class="contact-links">
              <p>
                <strong>Email:</strong><br />
                <a href="mailto:mbbwalteris@gmail.com">mbbwalteris@gmail.com</a>
              </p>
              <p>
                <strong>Phone:</strong><br />
                <a href="tel:4402519984">440-251-9984</a>
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
      <img class="puzzle-strip" src="assets/puzzle-banner.svg" alt="Colorful puzzle piece banner" />
      <div class="footer-inner">
        <p>&copy; <span id="year"></span> Melissa Walter. All rights reserved.</p>
        <p><a href="mailto:mbbwalteris@gmail.com">mbbwalteris@gmail.com</a></p>
      </div>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
