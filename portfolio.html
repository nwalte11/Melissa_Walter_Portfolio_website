<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | Melissa Walter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <nav class="top-nav">
      <div class="nav-container">
        <div class="nav-brand">Melissa Walter</div>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="resume.html">Resume</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </nav>

    <!-- ===== HEADER ===== -->
    <header class="site-header" id="top">
      <img class="puzzle-strip" src="assets/puzzle-banner.svg" alt="Colorful puzzle piece banner" />
    </header>

    <!-- ===== MAIN ===== -->
    <main>
      <section class="section subpage-section">
        <a class="back-link" href="index.html">&larr; Back to Home</a>
        <h2>Portfolio</h2>
        <div class="portfolio-upload" aria-label="Portfolio image uploads">
          <input
            id="portfolio-image-upload"
            type="file"
            accept="image/*,application/pdf"
            multiple
            hidden
          />
          <div class="portfolio-carousel-controls" aria-label="Portfolio carousel controls">
            <button id="portfolio-prev" class="portfolio-nav-btn" type="button" aria-label="Previous artifact">&#8592;</button>
            <label class="portfolio-upload-icon" for="portfolio-image-upload" aria-label="Upload artifacts">+</label>
            <button id="portfolio-next" class="portfolio-nav-btn" type="button" aria-label="Next artifact">&#8594;</button>
          </div>
          <div id="portfolio-image-grid" class="portfolio-image-grid" aria-label="Portfolio artifacts"></div>
        </div>
      </section>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
      <img class="puzzle-strip" src="assets/puzzle-banner.svg" alt="Colorful puzzle piece banner" />
      <div class="footer-inner">
        <p>&copy; <span id="year"></span> Melissa Walter. All rights reserved.</p>
        <p><a href="mailto:melissa.walter@example.com">melissa.walter@example.com</a></p>
      </div>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
